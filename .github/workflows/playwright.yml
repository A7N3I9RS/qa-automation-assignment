name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  full-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      report-ready: ${{ steps.check-pages-report.outputs.exists }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Type-check tests
        run: npx tsc --noEmit

      - name: Run full Playwright test suite
        run: npm test -- --workers=4
        env:
          SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
          API_RESPONSE_TIME_LIMIT_MS: 1000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Check Playwright report for GitHub Pages
        id: check-pages-report
        if: always()
        shell: bash
        run: |
          if [ -f playwright-report/index.html ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Playwright report for GitHub Pages
        if: ${{ always() && steps.check-pages-report.outputs.exists == 'true' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: playwright-report/

  deploy-report:
    needs: full-regression
    if: ${{ always() && needs.full-regression.outputs.report-ready == 'true' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Playwright report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
