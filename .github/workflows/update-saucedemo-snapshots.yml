name: Update SauceDemo Snapshots

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Update SauceDemo checkout snapshots
        run: npm run test:saucedemo:update-snapshots
        env:
          USERS_PASSWORD: ${{ secrets.USERS_PASSWORD }}

      - name: Upload Linux snapshots
        uses: actions/upload-artifact@v7
        with:
          name: saucedemo-linux-snapshots
          path: tests/saucedemo/checkout.spec.ts-snapshots/*-linux.png
          if-no-files-found: error
          retention-days: 7
